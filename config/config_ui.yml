      CRITICAL: red


## Task Management Configuration ##
task:
  table:
    columns:
      - name: "selected"
        label: ""
        field: "selected"
        align: "center"
        style: "width: 60px;"
        sortable: false

      - name: "task_id"
        label: "ID"
        field: "task_id"
        align: "left"
        style: "width: 100px;"
        sortable: true

      - name: "Title"
        label: "Title"
        field: "Title"
        align: "left"
        style: "min-width: 200px;"
        sortable: true

      - name: "Priority"
        label: "Priority"
        field: "Priority"
        align: "left"
        style: "width: 100px;"
        sortable: true

      - name: "Status"
        label: "Status"
        field: "Status"
        align: "left"
        style: "width: 120px;"
        sortable: true

      - name: "Assignee"
        label: "Assignee"
        field: "Assignee"
        align: "left"
        style: "width: 150px;"
        sortable: true

      - name: "actions"
        label: "Actions"
        field: "actions"
        align: "center"
        style: "width: 80px;"
        sortable: false
  meta:
    friendly_name: "Tasks"
    icon: "assignment"
    build_function: "build_task_tab_panel"

  add:
    action:
      function: "insert_task"
      button_name: "Add Task"
      main_action: "Task"
      main_param: "title"
      secondary_action: "added"

    fields:
      - name: "title"
        type: "input"
        label: "Task Title"
        optional: false
        default: ""

      - name: "description"
        type: "text"
        label: "Description"
        optional: true
        default: ""

      - name: "status"
        type: "select"
        label: "Status"
        optional: false
        options:
          ["To Do", "In Progress", "In Review", "Blocked", "On Hold", "Idea"]
        default: "To Do"
        with_input: false

      - name: "priority"
        type: "select"
        label: "Priority"
        optional: false
        options: ["Low", "Medium", "High", "Critical"]
        default: "Medium"
        with_input: false

      - name: "assigned_to"
        type: "input"
        label: "Assigned To"
        optional: true

      - name: "customer_name"
        type: "select"
        label: "Customer"
        optional: false
        options: []
        options_source: "customer_data"
        default: ""
        with_input: true
        allow_custom: false

      - name: "project_name"
        type: "select"
        label: "Project"
        optional: false
        options: []
        parent: "customer_name"
        options_source: "project_names"
        default: ""
        with_input: true
        allow_custom: false

      - name: "due_date"
        type: "date"
        label: "Due Date"
        optional: true
        default: ""

      - name: "estimated_hours"
        type: "number"
        label: "Estimated Hours"
        optional: true
        default: 0

      - name: "tags"
        type: "input"
        label: "Tags (comma-separated)"
        optional: true
        default: ""

    rows:
      - ["title"]
      - ["description"]
      - ["customer_name", "project_name"]
      - ["status", "priority"]
      - ["assigned_to"]
      - ["due_date", "estimated_hours"]
      - ["tags"]

  update:
    action:
      function: "update_task"
      button_name: "Update Task"
      main_action: "Task"
      main_param: "task_selector"
      secondary_action: "updated"

    fields:
      - name: "task_selector"
        type: "select"
        label: "Select Task"
        optional: false
        options: []
        options_source: "task_list"
        default: ""
        with_input: true
        allow_custom: false

      - name: "title"
        type: "input"
        label: "Task Title"
        optional: false
        default: ""
        parent: "task_selector"
        parent_update: true
        dynamic_query: "SELECT title FROM tasks WHERE title || ' (ID: ' || task_id || ')' = '{parent_value}'"
        dynamic_column: 0

      - name: "description"
        type: "text"
        label: "Description"
        optional: true
        default: ""
        parent: "task_selector"
        parent_update: true
        dynamic_query: "SELECT description FROM tasks WHERE title || ' (ID: ' || task_id || ')' = '{parent_value}'"
        dynamic_column: 0

      - name: "status"
        type: "select"
        label: "Status"
        optional: false
        options:
          ["To Do", "In Progress", "In Review", "Blocked", "On Hold", "Idea"]
        default: "To Do"
        with_input: false
        parent: "task_selector"
        parent_update: true
        dynamic_query: "SELECT status FROM tasks WHERE title || ' (ID: ' || task_id || ')' = '{parent_value}'"
        dynamic_column: 0

      - name: "priority"
        type: "select"
        label: "Priority"
        optional: false
        options: ["Low", "Medium", "High", "Critical"]
        default: "Medium"
        with_input: false
        parent: "task_selector"
        parent_update: true
        dynamic_query: "SELECT priority FROM tasks WHERE title || ' (ID: ' || task_id || ')' = '{parent_value}'"
        dynamic_column: 0

      - name: "assigned_to"
        type: "input"
        label: "Assigned To"
        optional: true
        default: ""
        with_input: true
        parent: "task_selector"
        parent_update: true
        dynamic_query: "SELECT assigned_to FROM tasks WHERE title || ' (ID: ' || task_id || ')' = '{parent_value}'"
        dynamic_column: 0

      - name: "due_date"
        type: "date"
        label: "Due Date"
        optional: true
        default: ""
        parent: "task_selector"
        parent_update: true
        dynamic_query: "SELECT due_date FROM tasks WHERE title || ' (ID: ' || task_id || ')' = '{parent_value}'"
        dynamic_column: 0

      - name: "estimated_hours"
        type: "number"
        label: "Estimated Hours"
        optional: true
        default: 0
        parent: "task_selector"
        parent_update: true
        dynamic_query: "SELECT estimated_hours FROM tasks WHERE title || ' (ID: ' || task_id || ')' = '{parent_value}'"
        dynamic_column: 0

      - name: "tags"
        type: "input"
        label: "Tags (comma-separated)"
        optional: true
        default: ""
        parent: "task_selector"
        parent_update: true
        dynamic_query: "SELECT tags FROM tasks WHERE title || ' (ID: ' || task_id || ')' = '{parent_value}'"
        dynamic_column: 0

    rows:
      - ["task_selector"]
      - ["title"]
      - ["description"]
      - ["status", "priority"]
      - ["assigned_to"]
      - ["due_date", "estimated_hours"]
      - ["tags"]

  delete:
    action:
      function: "delete_task"
      button_name: "Delete Task"
      main_action: "Task"
      main_param: "task_selector"
      secondary_action: "deleted"

    fields:
      - name: "task_selector"
        type: "select"
        label: "Select Task to Delete"
        optional: false
        options_source: "task_list"
        default: ""
        with_input: false

      - name: "confirm_delete"
        type: "switch"
        label: "Confirm Deletion"
        optional: false
        default: false

    rows:
      - ["task_selector"]
      - ["confirm_delete"]

  view:
    rows:
      - ["title"]
      - ["description"]
      - ["customer_name", "project_name"]
      - ["status", "priority"]
      - ["due_date", "assigned_to"]
      - ["estimated_hours", "actual_hours"]
      - ["completed"]
      - ["created_at"]

    fields:
      - name: "title"
        label: "Title"

      - name: "description"
        label: "Description"
        multiline: true

      - name: "customer_name"
        label: "Customer"

      - name: "project_name"
        label: "Project"

      - name: "status"
        label: "Status"

      - name: "priority"
        label: "Priority"

      - name: "due_date"
        label: "Due Date"

      - name: "assigned_to"
        label: "Assigned To"

      - name: "estimated_hours"
        label: "Estimated Hours"

      - name: "actual_hours"
        label: "Actual Hours"

      - name: "completed"
        label: "Completed"
        format: "boolean"

      - name: "created_at"
        label: "Created"
